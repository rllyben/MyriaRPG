<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Pickaxe">
  <defs>
    <linearGradient id="wood" x1="180" y1="470" x2="330" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7a3f22"/>
      <stop offset="0.55" stop-color="#b16739"/>
      <stop offset="1" stop-color="#e0a063"/>
    </linearGradient>

    <linearGradient id="woodHi" x1="210" y1="430" x2="300" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.00"/>
      <stop offset="0.4" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.00"/>
    </linearGradient>

    <linearGradient id="metal" x1="90" y1="120" x2="420" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eef3f8"/>
      <stop offset="0.45" stop-color="#a3afbc"/>
      <stop offset="1" stop-color="#5b6775"/>
    </linearGradient>

    <linearGradient id="edge" x1="120" y1="140" x2="430" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2e343c"/>
      <stop offset="1" stop-color="#12151a"/>
    </linearGradient>

    <linearGradient id="grip" x1="210" y1="460" x2="310" y2="330" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2a2d33"/>
      <stop offset="1" stop-color="#0e1014"/>
    </linearGradient>

    <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
    </filter>

    <filter id="headShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="256" cy="462" rx="150" ry="28" fill="#000" opacity="0.12"/>

  <!-- ROTATED PICKAXE -->
  <g transform="rotate(45 256 256)">

    <!-- Handle -->
    <g filter="url(#softShadow)">
      <path d="M238 462
               C248 472, 264 472, 274 462
               L298 438
               L292 174
               C292 154, 276 140, 256 140
               C236 140, 220 154, 220 174
               L214 438 Z"
            fill="url(#wood)" stroke="#1a120c" stroke-width="10" stroke-linejoin="round"/>

      <path d="M246 452
               L270 428
               L266 184
               C266 170, 262 162, 256 158
               C250 162, 246 170, 246 184
               L242 428 Z"
            fill="url(#woodHi)"/>

      <path d="M212 420
               L300 420
               L300 468
               C300 486, 285 500, 267 500
               L245 500
               C227 500, 212 486, 212 468 Z"
            fill="url(#grip)" stroke="#0a0b0f" stroke-width="10" stroke-linejoin="round"/>

      <path d="M226 436 H286" stroke="#ffffff" stroke-opacity="0.12" stroke-width="10" stroke-linecap="round"/>
      <path d="M226 456 H286" stroke="#ffffff" stroke-opacity="0.10" stroke-width="10" stroke-linecap="round"/>
      <path d="M226 476 H286" stroke="#ffffff" stroke-opacity="0.08" stroke-width="10" stroke-linecap="round"/>
    </g>

    <!-- Head -->
    <g filter="url(#headShadow)">
      <path d="M216 164
               H296
               C312 164, 324 176, 324 192
               V216
               C324 232, 312 244, 296 244
               H216
               C200 244, 188 232, 188 216
               V192
               C188 176, 200 164, 216 164 Z"
            fill="#2b3139" stroke="#111419" stroke-width="10" stroke-linejoin="round"/>

      <path d="M90 210
               C84 194, 92 176, 110 170
               C170 150, 228 154, 256 176
               C284 154, 342 150, 402 170
               C420 176, 428 194, 422 210
               C416 226, 396 234, 380 228
               C338 214, 296 214, 276 232
               C268 240, 262 248, 256 260
               C250 248, 244 240, 236 232
               C216 214, 174 214, 132 228
               C116 234, 96 226, 90 210 Z"
            fill="url(#metal)" stroke="#16181d" stroke-width="10" stroke-linejoin="round"/>

      <path d="M104 206 C142 188, 190 180, 224 190"
            fill="none" stroke="url(#edge)" stroke-width="12" stroke-linecap="round" opacity="0.9"/>

      <path d="M408 206 C370 188, 322 180, 288 190"
            fill="none" stroke="url(#edge)" stroke-width="12" stroke-linecap="round" opacity="0.9"/>

      <path d="M118 186
               C176 168, 226 170, 256 190
               C286 170, 336 168, 394 186"
            fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="10" stroke-linecap="round"/>
    </g>

  </g>
</svg>