<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Iron Ore">
  <defs>
    <linearGradient id="rock" x1="90" y1="90" x2="420" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6b6f7a"/>
      <stop offset="0.55" stop-color="#3f434c"/>
      <stop offset="1" stop-color="#24262b"/>
    </linearGradient>

    <linearGradient id="rust" x1="140" y1="140" x2="410" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#b04a2a"/>
      <stop offset="0.6" stop-color="#7d2f1a"/>
      <stop offset="1" stop-color="#541c10"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000" flood-opacity="0.25"/>
    </filter>

    <clipPath id="oreClip">
      <path d="M138 176
               L220 110
               L334 126
               L404 214
               L386 340
               L284 418
               L168 386
               L112 276 Z"/>
    </clipPath>
  </defs>

  <!-- Shadow base -->
  <ellipse cx="268" cy="430" rx="170" ry="38" fill="#000" opacity="0.12"/>

  <!-- Main rock -->
  <path filter="url(#softShadow)"
        d="M138 176
           L220 110
           L334 126
           L404 214
           L386 340
           L284 418
           L168 386
           L112 276 Z"
        fill="url(#rock)" stroke="#14151a" stroke-width="10" stroke-linejoin="round"/>

  <!-- Facets -->
  <path d="M220 110 L206 186 L138 176 Z" fill="#7a7f8c" opacity="0.65"/>
  <path d="M334 126 L306 206 L206 186 L220 110 Z" fill="#5b5f6b" opacity="0.85"/>
  <path d="M404 214 L306 206 L334 126 Z" fill="#4b4f5a" opacity="0.9"/>
  <path d="M386 340 L314 318 L404 214 Z" fill="#2f323a" opacity="0.95"/>
  <path d="M284 418 L314 318 L386 340 Z" fill="#3a3d46" opacity="0.9"/>
  <path d="M168 386 L210 304 L314 318 L284 418 Z" fill="#4a4e59" opacity="0.85"/>
  <path d="M112 276 L210 304 L168 386 Z" fill="#3a3e48" opacity="0.9"/>

  <!-- Rusty iron patches -->
  <g clip-path="url(#oreClip)" opacity="0.95">
    <path d="M165 245 C205 190, 255 210, 290 170
             C330 125, 380 155, 395 215
             C410 275, 350 310, 305 295
             C260 280, 245 330, 195 315
             C145 300, 140 275, 165 245 Z"
          fill="url(#rust)" opacity="0.9"/>
    <path d="M150 320 C180 300, 210 320, 230 355
             C250 390, 210 415, 175 395
             C140 375, 125 345, 150 320 Z"
          fill="#a43f24" opacity="0.75"/>
    <circle cx="330" cy="260" r="20" fill="#8d331d" opacity="0.75"/>
    <circle cx="355" cy="230" r="12" fill="#c65a33" opacity="0.65"/>
  </g>
</svg>