<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Default Item">
    <defs>
        <!-- Frame -->
        <linearGradient id="frameGrad" x1="100" y1="100" x2="412" y2="412">
            <stop offset="0" stop-color="#3a3f4a"/>
            <stop offset="1" stop-color="#161a22"/>
        </linearGradient>

        <!-- Inner background -->
        <radialGradient id="bgGrad" cx="50%" cy="45%" r="65%">
            <stop offset="0" stop-color="#2c3140"/>
            <stop offset="1" stop-color="#11141b"/>
        </radialGradient>

        <!-- Neutral crystal -->
        <linearGradient id="crystalGrad" x1="200" y1="140" x2="320" y2="360">
            <stop offset="0" stop-color="#cfd6e6"/>
            <stop offset="0.5" stop-color="#7f8aa3"/>
            <stop offset="1" stop-color="#3e4658"/>
        </linearGradient>

        <filter id="softShadow" x="-25%" y="-25%" width="150%" height="150%">
            <feDropShadow dx="0" dy="10" stdDeviation="10"
                          flood-color="#000" flood-opacity="0.35"/>
        </filter>
    </defs>

    <!-- Outer Frame -->
    <rect x="56" y="56" width="400" height="400" rx="64"
          fill="url(#frameGrad)"
          stroke="#0a0d12"
          stroke-width="14"/>

    <!-- Inner Panel -->
    <rect x="96" y="96" width="320" height="320" rx="40"
          fill="url(#bgGrad)"
          stroke="#0f1218"
          stroke-width="8"/>

    <!-- Subtle glow ring -->
    <circle cx="256" cy="256" r="110"
            fill="none"
            stroke="#ffffff"
            stroke-opacity="0.06"
            stroke-width="16"/>

    <!-- Generic Item Crystal -->
    <g filter="url(#softShadow)">
        <path d="M256 148
             L330 210
             L306 336
             L256 380
             L206 336
             L182 210 Z"
              fill="url(#crystalGrad)"
              stroke="#0c0f14"
              stroke-width="10"
              stroke-linejoin="round"/>

        <!-- Facets -->
        <path d="M256 148 L232 230 L182 210 Z"
              fill="#ffffff" opacity="0.18"/>
        <path d="M256 148 L330 210 L280 230 Z"
              fill="#000000" opacity="0.18"/>
        <path d="M206 336 L256 380 L306 336 Z"
              fill="#000000" opacity="0.15"/>

        <!-- Highlight -->
        <path d="M230 220
             C250 200, 280 200, 300 220"
              fill="none"
              stroke="#ffffff"
              stroke-opacity="0.25"
              stroke-width="10"
              stroke-linecap="round"/>
    </g>
</svg>